    #!/usr/bin/env python3
    from __future__ import annotations

    import argparse
    import json
    import math
    import os
    import subprocess
    import threading
    import time
    from concurrent.futures import ThreadPoolExecutor, as_completed
    from dataclasses import dataclass
    from datetime import datetime, timezone
    from pathlib import Path


    DEFAULT_BUCKET = "gitlab-lfs-prod"
    DEFAULT_CONCURRENCY = 4
    DEFAULT_TIMEOUT_SECONDS = 4 * 60 * 60
    DEFAULT_MAX_RETRIES = 5
    DEFAULT_SKIP_HOURS = 24


    @dataclass
    class PrefixResult:
        prefix: str
        status: str
        attempt: int
        message: str


    class SyncState:
        def __init__(self, path: Path) -> None:
            self.path = path
            self.lock = threading.Lock()
            self.data = self._load()

        def _load(self) -> dict:
            if not self.path.exists():
                return {}
            try:
                return json.loads(self.path.read_text())
            except json.JSONDecodeError:
                return {}

        def should_skip(self, prefix: str, now_ts: float, skip_seconds: int) -> bool:
            with self.lock:
                item = self.data.get(prefix, {})
                if item.get("last_result") != "success":
                    return False
                last_success = item.get("last_success_ts")
                if not isinstance(last_success, (int, float)):
                    return False
                return now_ts - last_success < skip_seconds

        def mark_success(self, prefix: str, attempt: int) -> None:
            now = time.time()
            with self.lock:
                item = self.data.setdefault(prefix, {})
                item["last_result"] = "success"
                item["last_success_ts"] = now
                item["last_success_at"] = iso_now()
                item["last_attempt"] = attempt
                self._save()

        def mark_failure(self, prefix: str, attempt: int, message: str) -> None:
            with self.lock:
                item = self.data.setdefault(prefix, {})
                item["last_result"] = "failed"
                item["last_failure_at"] = iso_now()
                item["last_attempt"] = attempt
                item["last_error"] = message
                self._save()

        def _save(self) -> None:
            self.path.parent.mkdir(parents=True, exist_ok=True)
            self.path.write_text(json.dumps(self.data, indent=2, sort_keys=True))


    def iso_now() -> str:
        return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")


    def append_log(log_path: Path, prefix: str, attempt: int, message: str) -> None:
        log_path.parent.mkdir(parents=True, exist_ok=True)
        line = f"[{iso_now()}] prefix={prefix} attempt={attempt} FAILED {message}\n"
        with log_path.open("a", encoding="utf-8") as fh:
            fh.write(line)


    def summarize_message(message: str, max_lines: int = 3) -> str:
        lines = [line.strip() for line in message.splitlines() if line.strip()]
        if not lines:
            return "no error output"
        if len(lines) <= max_lines:
            return " | ".join(lines)
        head = " | ".join(lines[:max_lines])
        return f"{head} | ... ({len(lines) - max_lines} more lines)"


    def format_duration(seconds: float) -> str:
        total = max(0, int(math.ceil(seconds)))
        hours, rem = divmod(total, 3600)
        minutes, secs = divmod(rem, 60)
        return f"{hours:02d}:{minutes:02d}:{secs:02d}"


    def run_mirror(mc_bin: str, bucket: str, prefix: str, timeout_seconds: int) -> tuple[bool, str]:
        src = f"origin/{bucket}/{prefix}/"
        dst = f"local/{bucket}/{prefix}/"
        cmd = [mc_bin, "mirror", "--overwrite", "--preserve", src, dst]
        try:
            completed = subprocess.run(
                cmd,
                check=False,
                capture_output=True,
                text=True,
                timeout=timeout_seconds,
                env=os.environ.copy(),
            )
        except subprocess.TimeoutExpired:
            return False, f"timeout after {timeout_seconds}s"

        output = "\n".join(
            part.strip() for part in (completed.stdout, completed.stderr) if part.strip()
        )
        if completed.returncode == 0:
            return True, output or "ok"
        return False, output or f"exit_code={completed.returncode}"


    def sync_one_prefix(
        prefix: str,
        mc_bin: str,
        bucket: str,
        timeout_seconds: int,
        max_retries: int,
        state: SyncState,
        log_path: Path,
        skip_seconds: int,
    ) -> PrefixResult:
        now_ts = time.time()
        if state.should_skip(prefix, now_ts, skip_seconds):
            return PrefixResult(prefix=prefix, status="skipped", attempt=0, message="recent success < 24h")

        last_message = ""
        for attempt in range(1, max_retries + 1):
            ok, message = run_mirror(mc_bin, bucket, prefix, timeout_seconds)
            if ok:
                state.mark_success(prefix, attempt)
                return PrefixResult(prefix=prefix, status="success", attempt=attempt, message=message)

            last_message = message
            state.mark_failure(prefix, attempt, message)
            append_log(log_path, prefix, attempt, message)

        return PrefixResult(prefix=prefix, status="failed", attempt=max_retries, message=last_message)


    def build_prefixes() -> list[str]:
        return [f"{i:02x}" for i in range(256)]


    def parse_args() -> argparse.Namespace:
        parser = argparse.ArgumentParser(description="Mirror origin gitlab-lfs-prod prefixes to local with retry/skip state.")
        parser.add_argument("--mc-bin", default="/usr/local/bin/mc")
        parser.add_argument("--bucket", default=DEFAULT_BUCKET)
        parser.add_argument("--concurrency", type=int, default=DEFAULT_CONCURRENCY)
        parser.add_argument("--timeout-seconds", type=int, default=DEFAULT_TIMEOUT_SECONDS)
        parser.add_argument("--max-retries", type=int, default=DEFAULT_MAX_RETRIES)
        parser.add_argument("--skip-hours", type=int, default=DEFAULT_SKIP_HOURS)
        parser.add_argument("--state-file", default="/tmp/gitlab-sync-state.json")
        parser.add_argument("--log-file", default="/tmp/gitlab-sync.log")
        parser.add_argument("--prefixes", nargs="*", help="Optional explicit prefixes, e.g. 00 01 ff")
        parser.add_argument("--verbose-skips", action="store_true")
        return parser.parse_args()


    def main() -> int:
        args = parse_args()
        state = SyncState(Path(args.state_file))
        log_path = Path(args.log_file)
        skip_seconds = args.skip_hours * 60 * 60
        prefixes = args.prefixes or build_prefixes()
        started_at = time.time()

        print(
            f"[{iso_now()}] start bucket={args.bucket} prefixes={len(prefixes)} "
            f"concurrency={args.concurrency} timeout={args.timeout_seconds}s retries={args.max_retries} "
            f"skip_hours={args.skip_hours} state_file={args.state_file} log_file={args.log_file} cwd={os.getcwd()}"
        )

        results: list[PrefixResult] = []
        with ThreadPoolExecutor(max_workers=args.concurrency) as executor:
            futures = {
                executor.submit(
                    sync_one_prefix,
                    prefix,
                    args.mc_bin,
                    args.bucket,
                    args.timeout_seconds,
                    args.max_retries,
                    state,
                    log_path,
                    skip_seconds,
                ): prefix
                for prefix in prefixes
            }
        for future in as_completed(futures):
            result = future.result()
            results.append(result)
            if result.status == "skipped":
                if args.verbose_skips:
                    print(
                        f"[{iso_now()}] prefix={result.prefix} status={result.status} "
                        f"attempt={result.attempt} message={result.message}"
                    )
                continue

            message = result.message
            if result.status == "failed":
                message = summarize_message(result.message)

            print(
                f"[{iso_now()}] prefix={result.prefix} status={result.status} "
                f"attempt={result.attempt} message={message}"
            )

        success = sum(1 for item in results if item.status == "success")
        skipped = sum(1 for item in results if item.status == "skipped")
        failed = sum(1 for item in results if item.status == "failed")
        duration = format_duration(time.time() - started_at)
        print(
            f"[{iso_now()}] done total={len(results)} success={success} skipped={skipped} failed={failed} duration={duration}"
        )
        return 1 if failed else 0


    if __name__ == "__main__":
        raise SystemExit(main())
  runner.sh: |
    #!/bin/sh
    set -eu

    LOCK_DIR="/tmp/gitlab-lfs-sync.lock"

    while true; do
      if mkdir "${LOCK_DIR}" 2>/dev/null; then
        trap 'rmdir "${LOCK_DIR}"' EXIT INT TERM
        python3 /scripts/gitlab_lfs_sync.py || true
        rmdir "${LOCK_DIR}"
        trap - EXIT INT TERM
      else
        echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] sync still running, skip this round"
      fi

      sleep 900
    done
