apiVersion: v1
kind: Pod
metadata:
  name: modelscope-download
  namespace: default
spec:
  containers:
  - name: modelscope
    image: image.ac.com:5000/k8s/python-modelscope:3.12
    imagePullPolicy: IfNotPresent
    command:
    - /bin/sh
    - -c
    - |
      modelscope download --model XiaomiMiMo/MiMo-V2.5 --cache_dir /models --max-workers 24
      echo "Download completed at $(date)"
      sleep infinity
    env:
    - name: http_proxy
      value: "http://jsyadmin:1cdf8f60@10.13.17.166:3128"
    - name: https_proxy
      value: "http://jsyadmin:1cdf8f60@10.13.17.166:3128"
    - name: HTTP_PROXY
      value: "http://jsyadmin:1cdf8f60@10.13.17.166:3128"
    - name: HTTPS_PROXY
      value: "http://jsyadmin:1cdf8f60@10.13.17.166:3128"
    volumeMounts:
    - name: models
      mountPath: /models
    resources:
      requests:
        memory: "4Gi"
        cpu: "8"
      limits:
        memory: "16Gi"
        cpu: "16"
  volumes:
  - name: models
    hostPath:
      path: /work2/ai_data/models
      type: DirectoryOrCreate
  restartPolicy: Never
