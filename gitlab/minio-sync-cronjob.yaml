---
# ConfigMap: sync script (prefix-based mirror, avoids timeout on large buckets)
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-lfs-sync-script
  namespace: ske
data:
  sync.sh: |
    #!/bin/sh
    set -eu

    BUCKET="gitlab-lfs-prod"
    MC="/usr/local/bin/mc"

    # Reuse node's mc config (has origin + minio-local aliases)
    export MC_CONFIG_DIR="/root/.mc"

    # Verify aliases exist
    $MC alias list origin >/dev/null 2>&1 || { echo "ERROR: mc alias 'origin' not found"; exit 1; }
    $MC alias list minio-local >/dev/null 2>&1 || { echo "ERROR: mc alias 'minio-local' not found"; exit 1; }

    echo "[$(date '+%Y-%m-%dT%H:%M:%S')] Starting prefix-based mirror: origin/${BUCKET} -> minio-local/${BUCKET}"

    SYNCED=0
    FAILED=0
    i=0
    while [ $i -lt 256 ]; do
      prefix=$(printf '%02x' $i)
      if $MC mirror --overwrite --preserve "origin/${BUCKET}/${prefix}/" "minio-local/${BUCKET}/${prefix}/" 2>&1; then
        echo "[$(date '+%Y-%m-%dT%H:%M:%S')] prefix=${prefix} OK"
      else
        echo "[$(date '+%Y-%m-%dT%H:%M:%S')] prefix=${prefix} FAILED (exit=$?)"
        FAILED=$((FAILED + 1))
      fi
      SYNCED=$((SYNCED + 1))
      i=$((i + 1))
    done

    echo "[$(date '+%Y-%m-%dT%H:%M:%S')] Done: ${SYNCED}/256 prefixes processed, ${FAILED} failed"
---
# CronJob: runs daily on a MinIO node
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-lfs-sync
  namespace: ske
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 72000  # 20h max per run
      backoffLimit: 1
      template:
        spec:
          hostNetwork: true
          nodeSelector:
            minio: "true"
          tolerations:
            - operator: Exists
          restartPolicy: Never
          volumes:
            - name: sync-script
              configMap:
                name: minio-lfs-sync-script
                defaultMode: 0755
            - name: mc-bin
              hostPath:
                path: /usr/local/bin
                type: Directory
            - name: mc-config
              hostPath:
                path: /root/.mc
                type: Directory
          containers:
            - name: sync
              image: image.ac.com:5000/k8s/library/busybox:1.31.1
              command: ["/bin/sh", "/scripts/sync.sh"]
              volumeMounts:
                - name: sync-script
                  mountPath: /scripts
                - name: mc-bin
                  mountPath: /usr/local/bin
                  readOnly: true
                - name: mc-config
                  mountPath: /root/.mc
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "2"
                  memory: 512Mi
